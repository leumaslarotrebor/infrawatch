name: InfraWatch CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Lint & test Bash scripts ──────────────────────────────────────────────
  lint-bash:
    name: Lint Bash scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint monitor.sh
        run: shellcheck scripts/monitor.sh

      - name: Lint docker-entrypoint.sh
        run: shellcheck docker-entrypoint.sh

  # ── Lint & test Python ───────────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install flake8 black

      - name: Check formatting with black
        run: black --check scripts/metrics_server.py

      - name: Lint with flake8
        run: flake8 scripts/metrics_server.py --max-line-length=100

  # ── Lint Ansible playbook ────────────────────────────────────────────────
  lint-ansible:
    name: Lint Ansible playbook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint and collections
        run: |
          pip install ansible-lint
          ansible-galaxy collection install -r requirements.yml

      - name: Lint deploy.yml
        run: ansible-lint ansible/deploy.yml
        continue-on-error: true  # informational only for now

  # ── Build Docker image ───────────────────────────────────────────────────
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint-bash, lint-python]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: infrawatch:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container health check test
        run: |
          docker run -d --name infrawatch-test \
            -p 9100:9100 \
            infrawatch:${{ github.sha }}

          sleep 15

          echo "===== CONTAINER STATUS ====="
          docker ps -a

          echo "===== CONTAINER LOGS ====="
          docker logs infrawatch-test || true

          curl -f http://localhost:9100/ || exit 1

          docker stop infrawatch-test

  # ── Push to registry (on main branch only) ──────────────────────────────
docker-push:
  if: false
  name: Push to Docker Hub
  runs-on: ubuntu-latest
  needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/infrawatch:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/infrawatch:${{ github.sha }}

